version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: hcrc_nextjs_app

    ports:
      - "3500:3000"

    environment:
      NODE_ENV: production

    restart: unless-stopped

    # optional but recommended
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
